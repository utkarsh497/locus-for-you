<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locus · The Software Factory — SDE-3 Backend</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #c0c0c0;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.03) 0px,
      rgba(0,0,0,0.03) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  .crt-flicker {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 99;
    animation: flicker 0.15s infinite;
    opacity: 0.02;
    background: white;
  }

  @keyframes flicker {
    0%, 100% { opacity: 0.02; }
    50% { opacity: 0.01; }
  }

  .terminal {
    padding: 20px 30px;
    height: 100vh;
    overflow-y: auto;
    position: relative;
  }

  .terminal::-webkit-scrollbar { width: 6px; }
  .terminal::-webkit-scrollbar-track { background: #0a0a0f; }
  .terminal::-webkit-scrollbar-thumb { background: #2D003C; border-radius: 3px; }

  /* Title bar */
  .title-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #1a1a2e;
    border-radius: 8px 8px 0 0;
    margin-bottom: 0;
    border: 1px solid #2a2a3e;
    border-bottom: none;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
  }

  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #28c840; }
  .title-text { color: #666; font-size: 12px; margin-left: 12px; }

  .terminal-body {
    background: #0d0d14;
    border: 1px solid #2a2a3e;
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 20px;
    min-height: 80vh;
  }

  /* Colors */
  .green { color: #00D173; }
  .purple { color: #b48ead; }
  .blue { color: #14B5F0; }
  .orange { color: #FF8C00; }
  .red { color: #CC4444; }
  .yellow { color: #ffbd2e; }
  .white { color: #e0e0e0; }
  .dim { color: #555; }
  .cyan { color: #88c0d0; }
  .bright { color: #fff; font-weight: 700; }
  .accent { color: #00D173; font-weight: 700; }

  /* Typing cursor */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: #00D173;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .line {
    opacity: 0;
    white-space: pre;
    min-height: 22px;
  }

  .line.visible {
    animation: fadeIn 0.15s ease forwards;
  }

  /* Progress bar */
  .progress-bar {
    display: inline-block;
    width: 200px;
    height: 10px;
    background: #1a1a2e;
    border-radius: 5px;
    overflow: hidden;
    vertical-align: middle;
  }

  .progress-fill {
    height: 100%;
    border-radius: 5px;
    width: 0%;
    transition: width 0.8s ease;
  }

  .progress-fill.green-bg { background: linear-gradient(90deg, #00D173, #00ff88); }
  .progress-fill.blue-bg { background: linear-gradient(90deg, #14B5F0, #5bc0fa); }
  .progress-fill.orange-bg { background: linear-gradient(90deg, #FF8C00, #ffaa33); }
  .progress-fill.red-bg { background: linear-gradient(90deg, #CC4444, #ff6666); }
  .progress-fill.purple-bg { background: linear-gradient(90deg, #6A3D99, #b48ead); }

  /* Pipeline visualization */
  .pipeline {
    display: flex;
    gap: 0;
    margin: 10px 0;
    opacity: 0;
  }

  .pipeline.visible {
    animation: fadeIn 0.4s ease forwards;
  }

  .pipe-stage {
    padding: 8px 16px;
    border: 1px solid;
    text-align: center;
    min-width: 120px;
    position: relative;
    opacity: 0.3;
    transition: all 0.5s ease;
  }

  .pipe-stage.active {
    opacity: 1;
    box-shadow: 0 0 15px rgba(0, 209, 115, 0.2);
  }

  .pipe-stage.done {
    opacity: 1;
  }

  .pipe-arrow {
    display: flex;
    align-items: center;
    color: #333;
    font-size: 18px;
    padding: 0 4px;
    transition: color 0.5s ease;
  }

  .pipe-arrow.lit { color: #00D173; }

  .stage-design { border-color: #b48ead; color: #b48ead; background: rgba(180, 142, 173, 0.05); }
  .stage-design.active, .stage-design.done { background: rgba(180, 142, 173, 0.15); }
  .stage-build { border-color: #14B5F0; color: #14B5F0; background: rgba(20, 181, 240, 0.05); }
  .stage-build.active, .stage-build.done { background: rgba(20, 181, 240, 0.15); }
  .stage-ship { border-color: #00D173; color: #00D173; background: rgba(0, 209, 115, 0.05); }
  .stage-ship.active, .stage-ship.done { background: rgba(0, 209, 115, 0.15); }
  .stage-run { border-color: #FF8C00; color: #FF8C00; background: rgba(255, 140, 0, 0.05); }
  .stage-run.active, .stage-run.done { background: rgba(255, 140, 0, 0.15); }
  .stage-fix { border-color: #CC4444; color: #CC4444; background: rgba(204, 68, 68, 0.05); }
  .stage-fix.active, .stage-fix.done { background: rgba(204, 68, 68, 0.15); }

  /* Blinking status */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .pulse { animation: pulse 2s ease infinite; }

  /* Matrix rain background */
  .matrix-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: -1;
    opacity: 0.03;
  }

  /* CTA Buttons */
  .cta-container {
    display: flex;
    gap: 16px;
    margin: 12px 0;
    flex-wrap: wrap;
    opacity: 0;
  }
  .cta-container.visible {
    animation: fadeIn 0.5s ease forwards;
  }
  .cta-btn {
    display: inline-block;
    padding: 10px 24px;
    border: 2px solid;
    border-radius: 4px;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0, 209, 115, 0.3);
  }
  .cta-primary {
    border-color: #00D173;
    color: #0d0d14;
    background: #00D173;
  }
  .cta-primary:hover {
    background: #00ff88;
    border-color: #00ff88;
  }
  .cta-secondary {
    border-color: #14B5F0;
    color: #14B5F0;
    background: transparent;
  }
  .cta-secondary:hover {
    background: rgba(20, 181, 240, 0.15);
  }
  .cta-tertiary {
    border-color: #555;
    color: #888;
    background: transparent;
  }
  .cta-tertiary:hover {
    border-color: #FF8C00;
    color: #FF8C00;
    background: rgba(255, 140, 0, 0.1);
  }
</style>

const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00D17330';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);

    div.innerHTML = html;
    output.appendChild(div);
    requestAnimationFrame(() => {
      div.classList.add('visible');
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    });
  }, d);
  return lineDelay;
}

    const arrows = [1,2,3,4];

          document.getElementById('ps-' + s).classList.add('done');
        }, 500);
      }, i * 600);
    });
  }, d);
  lineDelay += 3200;
}

function addProgress(id, cls, delay = BASE) {

  setTimeout(() => {
    const el = document.getElementById(id);

  lineDelay += 300;
}

// 1. Konami Code: ↑↑↓↓←→←→BA
const konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let konamiIndex = 0;

document.addEventListener('keydown', (e) => {
  if (e.key === konamiCode[konamiIndex]) {
    konamiIndex++;
    if (konamiIndex === konamiCode.length) {
      konamiIndex = 0;
      triggerEasterEgg();
    }
  } else {
    konamiIndex = 0;
  }
});

document.addEventListener('keydown', (e) => {

  if (secretBuffer.includes('sudo hire me')) {

    triggerEasterEgg();
  }
});
